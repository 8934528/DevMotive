# netlify.toml

[build]
  # This tells Netlify to publish from the root directory
  publish = "."

# No need for redirects since we want to serve code.html as the main page
# Instead, let's create a proper redirect rule
[[redirects]]
  from = "/"
  to = "/code.html"
  status = 200

# Optional: Handle 404s
[[redirects]]
  from = "/*"
  to = "/code.html"
  status = 200

# Headers for security
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    