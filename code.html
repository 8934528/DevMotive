<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevMotive - Improve Yourself As A Developer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="code.css">
</head>
<body>
    <div class="container py-5">
        <h1 class="text-center mb-5 display-4 fw-bold">Improve Yourself As A Developer.</h1>
        <div class="row g-4">
            <!-- card 1 -->
            <div class="col-md-6 col-lg-4">
                <div class="card h-100 border-0 shadow-sm">
                    <div class="card-body d-flex flex-column align-items-center text-center">
                        <i class="bi bi-code fs-1 mb-3"></i>
                        <h5 class="card-title">code daily</h5>
                    </div>
                </div>
            </div>
            <!-- card 2 -->
            <div class="col-md-6 col-lg-4">
                <div class="card h-100 border-0 shadow-sm">
                    <div class="card-body d-flex flex-column align-items-center text-center">
                        <i class="bi bi-people fs-1 mb-3"></i>
                        <h5 class="card-title">learn from others</h5>
                    </div>
                </div>
            </div>
            <!-- card 3 -->
            <div class="col-md-6 col-lg-4">
                <div class="card h-100 border-0 shadow-sm">
                    <div class="card-body d-flex flex-column align-items-center text-center">
                        <i class="bi bi-easel2 fs-1 mb-3"></i>
                        <h5 class="card-title">teach others</h5>
                    </div>
                </div>
            </div>
            <!-- card 4 -->
            <div class="col-md-6 col-lg-4">
                <div class="card h-100 border-0 shadow-sm">
                    <div class="card-body d-flex flex-column align-items-center text-center">
                        <i class="bi bi-journal-text fs-1 mb-3"></i>
                        <h5 class="card-title">take notes</h5>
                    </div>
                </div>
            </div>
            <!-- card 5 -->
            <div class="col-md-6 col-lg-4">
                <div class="card h-100 border-0 shadow-sm">
                    <div class="card-body d-flex flex-column align-items-center text-center">
                        <i class="bi bi-kanban fs-1 mb-3"></i>
                        <h5 class="card-title">make projects</h5>
                    </div>
                </div>
            </div>
            <!-- card 6 -->
            <div class="col-md-6 col-lg-4">
                <div class="card h-100 border-0 shadow-sm">
                    <div class="card-body d-flex flex-column align-items-center text-center">
                        <i class="bi bi-github fs-1 mb-3"></i>
                        <h5 class="card-title">use github for push code</h5>
                    </div>
                </div>
            </div>
            <!-- card 7 -->
            <div class="col-md-6 col-lg-4">
                <div class="card h-100 border-0 shadow-sm">
                    <div class="card-body d-flex flex-column align-items-center text-center">
                        <i class="bi bi-clipboard-check fs-1 mb-3"></i>
                        <h5 class="card-title">make plans</h5>
                    </div>
                </div>
            </div>
            <!-- card 8 -->
            <div class="col-md-6 col-lg-4">
                <div class="card h-100 border-0 shadow-sm">
                    <div class="card-body d-flex flex-column align-items-center text-center">
                        <i class="bi bi-clock fs-1 mb-3"></i>
                        <h5 class="card-title">spend time learning</h5>
                    </div>
                </div>
            </div>
            <!-- card 9 -->
            <div class="col-md-6 col-lg-4">
                <div class="card h-100 border-0 shadow-sm">
                    <div class="card-body d-flex flex-column align-items-center text-center">
                        <i class="bi bi-chat-heart fs-1 mb-3"></i>
                        <h5 class="card-title">Be active in tech community</h5>
                    </div>
                </div>
            </div>
            <!-- card 10 -->
            <div class="col-md-6 col-lg-4">
                <div class="card h-100 border-0 shadow-sm">
                    <div class="card-body d-flex flex-column align-items-center text-center">
                        <i class="bi bi-book fs-1 mb-3"></i>
                        <h5 class="card-title">read books/docs</h5>
                    </div>
                </div>
            </div>
            <!-- card 11 -->
            <div class="col-md-6 col-lg-4">
                <div class="card h-100 border-0 shadow-sm">
                    <div class="card-body d-flex flex-column align-items-center text-center">
                        <i class="bi bi-question-circle fs-1 mb-3"></i>
                        <h5 class="card-title">be curious</h5>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="code.js"></script>
</body>
</html>
